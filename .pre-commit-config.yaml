repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff (format)
        entry: ruff format
        language: system
        types: [python]

      - id: pyright
        name: pyright
        entry: pyright
        language: system
        types: [python]
        pass_filenames: true
